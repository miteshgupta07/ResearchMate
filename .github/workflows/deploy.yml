name: Deploy ResearchMate

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check .


  test:
    needs: lint

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.128.0
          pip install pytest

      - name: Run Tests
        run: |
          pytest -v


  deploy:
    needs: [lint, test]

    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'Deploy it')

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/ResearchMate

            git fetch origin
            git reset --hard origin/main

            source venv/bin/activate

            sudo systemctl restart researchmate_backend
            sudo systemctl restart researchmate_frontend
